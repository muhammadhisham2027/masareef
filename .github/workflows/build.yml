name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: |
          curl -L https://services.gradle.org/distributions/gradle-8.9-bin.zip -o gradle.zip
          unzip -q gradle.zip -d /opt/gradle
          echo "/opt/gradle/gradle-8.9/bin" >> $GITHUB_PATH

      - name: Build debug APK
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Copy APK
        run: cp app/build/outputs/apk/debug/app-debug.apk masareef.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: masareef-apk
          path: masareef.apk

      - name: Publish to Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Masareef v2 build ${{ github.run_number }}
          files: masareef.apk
